services:
  mongodb:
    image: mongo:4
    container_name: autopwndoc-mongodb
    volumes:
      - mongo-data:/data/db
    restart: always
    ports:
      - 127.0.0.1:27017:27017
    environment:
      - MONGO_DB:pwndoc
    networks:
      - backend

  backend:
    build: ./backend
    image: pwndoc-ng/pwndoc-ng:backend
    container_name: autopwndoc-backend
    volumes:
      - ./backend/report-templates:/app/report-templates
      - ./backend/src/config:/app/src/config
    depends_on:
      - mongodb
    environment:
      - COLLAB_WEBSOCKET_PORT=8440
      - APP_URL=https://localhost:8443
    restart: always
    ports:
      - 4242:4242
    links:
      - mongodb
    networks:
      - backend

  frontend:
    build: ./frontend
    image: pwndoc-ng/pwndoc-ng:frontend
    container_name: autopwndoc-frontend
    restart: always
    environment:
      - Java_Xms=512m
      - Java_Xmx=2g
    ports:
      - 8443:8443
    networks:
      - backend

  languagetool:
    image: erikvl87/languagetool
    container_name: autopwndoc-languagetool
    restart: always
    networks:
      - backend

  chroma:
      image: chromadb/chroma:1.5.5
      container_name: autopwndoc-chroma
      networks:
        - autopwndoc-net
      environment:
        - IS_PERSISTENT=TRUE
        - ANONYMIZED_TELEMETRY=FALSE
      volumes:
        - chroma-data-dev:/data
      ports:
        - 127.0.0.1:8000:8000
      restart: always

volumes:
  mongo-data:

networks:
  backend:
      driver: bridge
