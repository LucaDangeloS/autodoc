networks:
  autodoc-net:
    driver: bridge

services:

  mongodb:
    image: mongo:4.2.15
    container_name: mongo-pwndoc-ng
    networks:
      - autodoc-net
    volumes:
      - mongo-data-dev:/data/db
    ports:
      - 127.0.0.1:27017:27017
    restart: always
    environment:
      - MONGO_DB=pwndoc

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile.dev
    container_name: pwndoc-ng-backend
    entrypoint: ""
    working_dir: "/app"
    command: "npm run dev"
    networks:
      - autodoc-net
    environment:
      # Set MIGRATE_FROM to a MongoDB URI to trigger a one-time migration from
      # an existing pwndoc-ng database into this instance on next startup.
      # Example: mongodb://192.168.1.10:27017/pwndoc
      # Leave blank (or remove) to skip migration entirely.
      - MIGRATE_FROM=
    volumes:
      - ./backend/src/:/app/src/
      - ./backend/report-templates/:/app/report-templates/
      - ./backend/ssl/:/app/ssl/
      - ./backend/tests/:/app/tests/
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/swagger.js:/app/swagger.js
      - ./backend/nodemon.json:/app/nodemon.json
      - backend-node-modules:/app/node_modules
    depends_on:
      - mongodb
      - chroma
    restart: always

  frontend-app:
    build:
      context: ./frontend/
      dockerfile: Dockerfile.dev
    container_name: autodoc-frontend-app-1
    networks:
      - autodoc-net
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/ssl:/app/ssl
      - ./frontend/public:/app/public
      - ./frontend/.postcssrc.js:/app/.postcssrc.js
      - ./frontend/babel.config.js:/app/babel.config.js
      - ./frontend/quasar.conf.js:/app/quasar.conf.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - frontend-node-modules:/app/node_modules
    restart: always

  frontend:
    image: nginx:stable-alpine
    user: root
    networks:
      - autodoc-net
    volumes:
      - ./frontend/.docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/ssl:/etc/nginx/ssl/
    restart: always
    ports:
      - 8443:8443

  chroma:
    image: chromadb/chroma:1.5.5
    container_name: pwndoc-ng-chroma
    networks:
      - autodoc-net
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data-dev:/data
    ports:
      - 127.0.0.1:8000:8000
    restart: always

volumes:
  mongo-data-dev:
  chroma-data-dev:
  backend-node-modules:
  frontend-node-modules:
