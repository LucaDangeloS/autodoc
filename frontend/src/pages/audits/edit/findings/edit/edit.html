<template>
    <div>
      <breadcrumb
        buttons
        :title="localAudit?.name ? `${localAudit.name} (${localAudit.auditType || 'Audit Type not set'})` : 'Loading...'"
        :state="parentState"
        :approvals="parentApprovals"
      >
        <template #buttons>
          <q-btn
            color="orange"
            class="q-mr-sm"
            :label="$t('btn.backupFinding')"
            no-caps
            :disable="loading"
            @click="backupFinding()"
          />
          <q-btn
            v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT && $settings && $settings.ai && $settings.ai.enabled && $settings.ai.embeddingEnabled"
            color="secondary"
            class="q-mr-sm"
            no-caps
            icon="search"
            :label="$t('similarVulnSearch')"
            :disable="loading"
            @click="searchSimilarVulns()"
          />
          <q-btn
            color="negative"
            class="q-mr-sm"
            :label="$t('btn.delete')"
            no-caps
            :disable="loading"
            @click="deleteFinding()"
            v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
          />
          <q-btn
            color="positive"
            :disable="loading || !readyToSave"
            :label="$t('btn.save') + ' (ctrl+s)'"
            no-caps
            @click="updateFinding()"
            v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
          />
        </template>
      </breadcrumb>

      <div class="row">
        <q-tabs
          v-model="selectedTab"
          align="left"
          indicator-color="primary"
          active-bg-color="grey-3"
          class="bg-white full-width"
        >
          <q-tab name="definition" default :label="$t('definition')" />
          <q-tab name="proofs" :label="$t('proofs')" />
          <q-tab v-if="localAudit && localAudit.isRetest" name="retest" :label="$t('retestEvidence')" />
          <q-tab name="details" :label="$t('details')" />
          <template v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT">
            <q-separator vertical />
            <q-toggle
              :label="$t('completed')"
              v-model="finding.status"
              :true-value="0"
              :false-value="1"
              checked-icon="check"
              unchecked-icon="clear"
              color="green"
              :disable="loading"
            />
          </template>
          <q-space />
        </q-tabs>

        <q-tab-panels
          v-model="selectedTab"
          animated
          class="bg-transparent col-md-8 col-12 offset-md-2 q-mt-md"
          @before-transition="syncEditors"
          @transition="updateOrig"
        >
          <!-- DEFINITION -->
          <q-tab-panel name="definition">
            <q-card>
              <q-inner-loading :showing="loading">
                <q-spinner-dots size="40px" color="primary" />
              </q-inner-loading>
              <q-card-section class="row q-col-gutter-md">
                <q-input
                  class="col-md-8 col-12"
                  :label="$t('title') + ' *'"
                  stack-label
                  v-model="finding.title"
                  outlined
                  :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                />
                <q-select
                  class="col-md-4 col-12"
                  :label="$t('type')"
                  v-model="finding.vulnType"
                  :options="filteredVulnTypes"
                  option-value="name"
                  option-label="name"
                  use-input
                  input-debounce="0"
                  @filter="filterType"
                  emit-value
                  map-options
                  options-sanitize
                  outlined
                  :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                />
                <div class="col-md-12 row items-center justify-between q-mt-sm">
                  <span class="text-subtitle2 text-grey-7">{{$t('description')}}</span>
                  <q-btn
                    v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    flat dense color="purple" icon="auto_awesome" :label="$t('aiSuggest')"
                    @click="generateAiDescription"
                    :loading="aiLoading"
                    :disable="loading"
                  />
                </div>
                <q-field class="col-md-12 basic-editor" borderless stack-label>
                  <template #control>
                    <basic-editor
                      ref="basiceditor_description"
                      v-model="finding.description"
                      v-on:ready="readyToSave = true"
                      idUnique="basiceditor_description"
                      fieldName="description"
                      :aiContext="{ findingTitle: finding.title, locale: audit && audit.language }"
                      noSync
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </template>
                </q-field>
                <q-field class="col-md-12 basic-editor" borderless :label="$t('observation')" stack-label>
                  <template #control>
                    <basic-editor
                      ref="basiceditor_observation"
                      v-model="finding.observation"
                      idUnique="basiceditor_observation"
                      fieldName="observation"
                      :aiContext="{ findingTitle: finding.title, locale: audit && audit.language }"
                      noSync
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </template>
                </q-field>
                <textarea-array
                  class="col-12"
                  :label="$t('references')"
                  v-model="finding.references"
                  :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                />
              </q-card-section>

              <q-expansion-item
                :label="$t('customFields')"
                v-if="finding.customFields !== undefined"
                default-opened
                header-class="bg-blue-grey-5 text-white"
                expand-icon-class="text-white"
              >
                <custom-fields
                  ref="customfields"
                  v-model="finding.customFields"
                  :category="finding.category || ''"
                  :idUnique="finding._id"
                  custom-element="QCardSection"
                  :locale="audit?.language || 'en'"
                  :readonly="loading"
                />
              </q-expansion-item>
            </q-card>
          </q-tab-panel>

          <!-- PROOFS -->
          <q-tab-panel name="proofs">
            <div class="q-col-gutter-md row">
              <div class="col-12">
                <q-card>
                  <q-inner-loading :showing="loading">
                    <q-spinner-dots size="40px" color="primary" />
                  </q-inner-loading>
                  <q-card-section v-if="frontEndAuditState === AUDIT_VIEW_STATE.EDIT && $settings && $settings.ai && $settings.ai.enabled && $settings.ai.visionEnabled" class="q-pb-none row justify-end">
                    <q-btn
                      color="secondary"
                      no-caps
                      icon="image_search"
                      :label="$t('searchSimilarFromProofs')"
                      :loading="similarVulnLoading && similarVulnIsProofMode"
                      :disable="loading"
                      @click="searchSimilarFromProofs()"
                      size="sm"
                      outline
                    />
                  </q-card-section>
                  <q-card-section>
                    <basic-editor
                      ref="basiceditor_poc"
                      v-model="finding.poc"
                      idUnique="basiceditor_poc"
                      fieldName="poc"
                      :aiContext="{ findingTitle: finding.title, locale: audit && audit.language }"
                      noSync
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </q-card-section>
                </q-card>
              </div>
            </div>
          </q-tab-panel>

          <!-- RETEST EVIDENCE -->
          <q-tab-panel name="retest" v-if="localAudit && localAudit.isRetest">
            <div class="q-col-gutter-md row">
              <div class="col-12">
                <q-card>
                  <q-inner-loading :showing="loading">
                    <q-spinner-dots size="40px" color="primary" />
                  </q-inner-loading>
                  <q-card-section class="row items-center q-pb-xs">
                    <span class="text-subtitle2">{{ $t('retestResult') }}</span>
                    <template-hint template-var="finding.retest_passed" />
                    <q-space />
                    <q-btn-toggle
                      v-model="finding.retestPassed"
                      :options="[
                        { label: $t('retestFailed'), value: false },
                        { label: $t('retestPassed'), value: true }
                      ]"
                      :toggle-color="finding.retestPassed === true ? 'positive' : finding.retestPassed === false ? 'negative' : 'grey-5'"
                      unelevated
                      rounded
                      no-caps
                      :disable="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                    />
                    <q-btn
                      v-if="finding.retestPassed !== null && !loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                      flat dense round icon="clear" color="grey-6" size="sm"
                      class="q-ml-xs"
                      @click="finding.retestPassed = null"
                    >
                      <q-tooltip>{{ $t('retestClearResult') }}</q-tooltip>
                    </q-btn>
                  </q-card-section>

                  <q-separator />

                  <q-card-section>
                    <div class="row items-center q-mb-sm">
                      <span class="text-subtitle2 text-grey-7">{{ $t('retestEvidenceContent') }}</span>
                      <template-hint template-var="finding.retest_evidence | convertHTML" class="q-ml-xs" />
                    </div>
                    <basic-editor
                      ref="basiceditor_retestEvidence"
                      v-model="finding.retestEvidence"
                      idUnique="basiceditor_retestEvidence"
                      fieldName="retestEvidence"
                      :aiContext="{ findingTitle: finding.title, locale: localAudit && localAudit.language }"
                      noSync
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </q-card-section>
                </q-card>
              </div>
            </div>
          </q-tab-panel>

          <!-- DETAILS -->
          <q-tab-panel name="details">
            <q-card>
              <q-inner-loading :showing="loading">
                <q-spinner-dots size="40px" color="primary" />
              </q-inner-loading>
              <q-card-section>{{ $t('affectedAssets') }}</q-card-section>
              <q-separator />
              <q-card-section>
                <q-field borderless>
                  <template #control>
                    <basic-editor
                      v-model="finding.scope"
                      idUnique="basiceditor_scope"
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </template>
                </q-field>
              </q-card-section>
            </q-card>

            <q-card class="q-mt-md bg-grey-1">
              <q-inner-loading :showing="loading">
                <q-spinner-dots size="40px" color="primary" />
              </q-inner-loading>
              <div class="col-12">
                <cvss-calculator-unified
                  v-model="finding.cvssv3"
                  v-model:cvssv4Value="finding.cvssv4"
                  :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                />
              </div>
            </q-card>

            <q-card class="q-mt-md">
              <q-inner-loading :showing="loading">
                <q-spinner-dots size="40px" color="primary" />
              </q-inner-loading>
              <q-card-section>{{ $t('courseOfActions') }}</q-card-section>
              <q-separator />
              <q-card-section>
                <div class="q-col-gutter-md row">
                  <q-select
                    :label="$t('remediationDifficulty')"
                    stack-label
                    class="col-md-6 col-12"
                    v-model="finding.remediationComplexity"
                    :options="[
                      { label: $t('easy'), value: 1 },
                      { label: $t('medium'), value: 2 },
                      { label: $t('complex'), value: 3 }
                    ]"
                    map-options
                    emit-value
                    options-sanitize
                    outlined
                    :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                  />
                  <q-select
                    :label="$t('priority')"
                    stack-label
                    class="col-md-6 col-12"
                    v-model="finding.priority"
                    :options="[
                      { label: $t('low'), value: 1 },
                      { label: $t('medium'), value: 2 },
                      { label: $t('high'), value: 3 },
                      { label: $t('urgent'), value: 4 }
                    ]"
                    map-options
                    emit-value
                    options-sanitize
                    outlined
                    :readonly="loading || frontEndAuditState !== AUDIT_VIEW_STATE.EDIT"
                  />
                </div>
                <q-field class="col-md-12 basic-editor q-mt-md" borderless :label="$t('remediation')" stack-label>
                  <template #control>
                    <basic-editor
                      ref="basiceditor_remediation"
                      v-model="finding.remediation"
                      idUnique="basiceditor_remediation"
                      fieldName="remediation"
                      :aiContext="{ findingTitle: finding.title, locale: audit && audit.language }"
                      noSync
                      :editable="!loading && frontEndAuditState === AUDIT_VIEW_STATE.EDIT"
                    />
                  </template>
                </q-field>
              </q-card-section>
            </q-card>
          </q-tab-panel>
        </q-tab-panels>
      </div>

      <similar-vuln-modal
        v-model="similarVulnModalOpen"
        :results="similarVulnResults"
        :loading="similarVulnLoading"
        :error="similarVulnError"
        :current-finding="finding"
        :is-proof-mode="similarVulnIsProofMode"
        :vision-summary="proofVisionSummary"
        :generated-poc="proofGeneratedPoc"
        :poc-loading="proofPocLoading"
        @apply="applySimilarVuln"
        @select="onProofResultSelected"
      />
    </div>
  </template>
